name: Deploy Lambdas

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
#      - "*.sln"
#      - "Directory.Build.props"
#      - "Directory.Packages.props"
#      - ".github/workflows/deploy-lambdas.yml"

  workflow_dispatch:
    inputs:
      target_function:
        description: "Lambda function to deploy"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - all
          - disable_package_payment_plans
          - enable_package_auto_confirm_tickets
          - ensure_payment_option_exists
          - disable_event_payment_plans
          - expire_and_block_packages
          - write_package_audit_trail

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DOTNET_VERSION: "10.0.x"
  TARGET_FUNCTION: ${{ github.event.inputs.target_function || 'auto' }}

jobs:
  detect-changes:
    name: Detect changed Lambda projects
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Lambda projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          ALL_LAMBDAS='[
            {
              "key": "disable_package_payment_plans",
              "project_dir": "src/Lambdas/DisablePackagePaymentPlans",
              "function_name": "travel-packages-system-disable-package-payment-plans"
            },
            {
              "key": "enable_package_auto_confirm_tickets",
              "project_dir": "src/Lambdas/EnablePackageAutoConfirmTickets",
              "function_name": "travel-packages-system-enable-package-auto-confirm-tickets"
            },
            {
              "key": "ensure_payment_option_exists",
              "project_dir": "src/Lambdas/EnsurePaymentOptionExists",
              "function_name": "travel-packages-system-ensure-payment-option-exists"
            },
            {
              "key": "disable_event_payment_plans",
              "project_dir": "src/Lambdas/DisableEventPaymentPlans",
              "function_name": "travel-packages-system-disable-event-payment-plans"
            },
            {
              "key": "expire_and_block_packages",
              "project_dir": "src/Lambdas/ExpireAndBlockPackages",
              "function_name": "travel-packages-system-expire-and-block-packages"
            },
            {
              "key": "write_package_audit_trail",
              "project_dir": "src/Lambdas/WritePackageAuditTrail",
              "function_name": "travel-packages-system-write-package-audit-trail"
            }
          ]'

          echo "Target function: $TARGET_FUNCTION"

          if [ "$TARGET_FUNCTION" = "all" ]; then
            echo "Manual selection is all. Deploying all Lambdas."
            MATRIX=$(echo "$ALL_LAMBDAS" | jq -c '.')

          elif [ "$TARGET_FUNCTION" != "auto" ] && [ "$TARGET_FUNCTION" != "" ]; then
            echo "Manual selection is specific Lambda: $TARGET_FUNCTION"
            MATRIX=$(echo "$ALL_LAMBDAS" | jq -c --arg key "$TARGET_FUNCTION" '[.[] | select(.key == $key)]')

          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Manual run with auto selected. Comparing HEAD~1 to HEAD."
              BASE_SHA="$(git rev-parse HEAD~1)"
              HEAD_SHA="${{ github.sha }}"
            else
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.sha }}"

              if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
                echo "No valid before SHA found. Falling back to HEAD~1."
                BASE_SHA="$(git rev-parse HEAD~1)"
              fi
            fi

            echo "Comparing changes from $BASE_SHA to $HEAD_SHA"

            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_files.txt

            echo "Changed files:"
            cat changed_files.txt

            CHANGED_JSON=$(jq -R -s -c 'split("\n")[:-1]' changed_files.txt)

            SHARED_CHANGED=$(echo "$CHANGED_JSON" | jq -r '
              any(.[];
                startswith("src/Shared/") or
                startswith("src/Lambdas/Shared/") or
                startswith("src/Common/") or
                startswith("src/Lambdas/Common/") or
                endswith(".sln") or
                . == "Directory.Build.props" or
                . == "Directory.Packages.props"
              )
            ')

            if [ "$SHARED_CHANGED" = "true" ]; then
              echo "Shared, common, solution, or build configuration change detected. Deploying all Lambdas."
              MATRIX=$(echo "$ALL_LAMBDAS" | jq -c '.')
            else
              MATRIX=$(echo "$ALL_LAMBDAS" | jq -c --argjson changed "$CHANGED_JSON" '
                [
                  .[] |
                  select(
                    . as $lambda |
                    any($changed[]; startswith($lambda.project_dir + "/"))
                  )
                ]
              ')
            fi
          fi

          COUNT=$(echo "$MATRIX" | jq 'length')

          echo "Detected Lambda count: $COUNT"
          echo "Matrix:"
          echo "$MATRIX" | jq '.'

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Restore, build, and test changed projects
    runs-on: ubuntu-latest
    needs: detect-changes

    if: needs.detect-changes.outputs.has_changes == 'true'

    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Lambda project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ matrix.lambda.project_dir }}"

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "ERROR: Project directory not found: $PROJECT_DIR"
            exit 1
          fi

          PROJECT_FILE=$(find "$PROJECT_DIR" -maxdepth 1 -name "*.csproj" | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "ERROR: No .csproj file found in: $PROJECT_DIR"
            exit 1
          fi

          echo "Restoring $PROJECT_FILE"
          dotnet restore "$PROJECT_FILE"

      - name: Build Lambda project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ matrix.lambda.project_dir }}"
          PROJECT_FILE=$(find "$PROJECT_DIR" -maxdepth 1 -name "*.csproj" | head -n 1)

          echo "Building $PROJECT_FILE"
          dotnet build "$PROJECT_FILE" \
            --configuration Release \
            --no-restore

      - name: Run matching tests if present
        shell: bash
        run: |
          set -euo pipefail

          KEY="${{ matrix.lambda.key }}"

          echo "Looking for tests related to $KEY"

          TEST_PROJECTS=$(find tests -name "*.csproj" 2>/dev/null | grep -i "$KEY" || true)

          if [ -z "$TEST_PROJECTS" ]; then
            echo "No matching test projects found for $KEY. Skipping tests for this Lambda."
            exit 0
          fi

          for test_project in $TEST_PROJECTS; do
            echo "Running tests for $test_project"
            dotnet test "$test_project" \
              --configuration Release \
              --verbosity normal
          done

  deploy:
    name: Deploy ${{ matrix.lambda.key }}
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test

    if: needs.detect-changes.outputs.has_changes == 'true'

    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install AWS Lambda .NET Tools
        shell: bash
        run: |
          dotnet tool install -g Amazon.Lambda.Tools
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          PROJECT_DIR="${{ matrix.lambda.project_dir }}"
          ZIP_FILE="artifacts/${{ matrix.lambda.key }}-${GITHUB_SHA}.zip"

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "ERROR: Project directory not found: $PROJECT_DIR"
            exit 1
          fi

          if ! find "$PROJECT_DIR" -maxdepth 1 -name "*.csproj" | grep -q .; then
            echo "ERROR: No .csproj file found in: $PROJECT_DIR"
            exit 1
          fi

          echo "Packaging Lambda project: $PROJECT_DIR"
          echo "Output package: $ZIP_FILE"

          dotnet lambda package \
            --project-location "$PROJECT_DIR" \
            --configuration Release \
            --framework net10.0 \
            --output-package "$ZIP_FILE"

      - name: Deploy Lambda code
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="artifacts/${{ matrix.lambda.key }}-${GITHUB_SHA}.zip"
          FUNCTION_NAME="${{ matrix.lambda.function_name }}"

          echo "Deploying $ZIP_FILE to $FUNCTION_NAME"

          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file "fileb://$ZIP_FILE"

          echo "Waiting for Lambda update to finish..."

          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"

          echo "Deployment completed for $FUNCTION_NAME"

      - name: Summary
        shell: bash
        run: |
          echo "Deployment completed."
          echo "Lambda key: ${{ matrix.lambda.key }}"
          echo "Lambda function: ${{ matrix.lambda.function_name }}"
          echo "Project directory: ${{ matrix.lambda.project_dir }}"
          echo "Git SHA: $GITHUB_SHA"

  no-changes:
    name: No Lambda changes detected
    runs-on: ubuntu-latest
    needs: detect-changes

    if: needs.detect-changes.outputs.has_changes != 'true'

    steps:
      - name: Nothing to deploy
        run: |
          echo "No Lambda project changes detected. Nothing to build or deploy."