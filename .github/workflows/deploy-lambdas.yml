name: Deploy  Lambdas

on:
  push:
    branches:
      - main
    paths:
      - "src/**"

  workflow_dispatch:
    inputs:
      target_function:
        description: "Lambda function to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - disable_package_payment_plans
          - enable_package_auto_confirm_tickets
          - ensure_payment_option_exists
          - disable_event_payment_plans
          - expire_and_block_packages
          - write_package_audit_trail
          - lambda1
          - lambda2

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DOTNET_VERSION: "10.0.x"
  TARGET_FUNCTION: ${{ github.event.inputs.target_function || 'all' }}

jobs:
  test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail

          if ls *.sln >/dev/null 2>&1; then
            echo "Solution file found. Running dotnet restore."
            dotnet restore
          else
            echo "No solution file found. Restoring all src projects."
            find src -name "*.csproj" -print0 | while IFS= read -r -d '' project; do
              echo "Restoring $project"
              dotnet restore "$project"
            done
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          if ls *.sln >/dev/null 2>&1; then
            echo "Solution file found. Running dotnet build."
            dotnet build --configuration Release --no-restore
          else
            echo "No solution file found. Building all src projects."
            find src -name "*.csproj" -print0 | while IFS= read -r -d '' project; do
              echo "Building $project"
              dotnet build "$project" --configuration Release --no-restore
            done
          fi

  deploy:
    name: Deploy ${{ matrix.lambda.key }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        lambda:
          - key: disable_package_payment_plans
            project_dir: src/Lambdas/TravelPackagesSystem.DisablePackagePaymentPlans
            function_name: travel-packages-system-disable-package-payment-plans

          - key: enable_package_auto_confirm_tickets
            project_dir: src/Lambdas/TravelPackagesSystem.EnablePackageAutoConfirmTickets
            function_name: travel-packages-system-enable-package-auto-confirm-tickets

          - key: ensure_payment_option_exists
            project_dir: src/Lambdas/TravelPackagesSystem.EnsurePaymentOptionExists
            function_name: travel-packages-system-ensure-payment-option-exists

          - key: disable_event_payment_plans
            project_dir: src/Lambdas/TravelPackagesSystem.DisableEventPaymentPlans
            function_name: travel-packages-system-disable-event-payment-plans

          - key: expire_and_block_packages
            project_dir: src/Lambdas/TravelPackagesSystem.ExpireAndBlockPackages
            function_name: travel-packages-system-expire-and-block-packages

          - key: write_package_audit_trail
            project_dir: src/Lambdas/TravelPackagesSystem.WritePackageAuditTrail
            function_name: travel-packages-system-write-package-audit-trail

          - key: lambda1
            project_dir: src/Lambdas/Lambda1
            function_name: lambda1

          - key: lambda2
            project_dir: src/Lambdas/Lambda2
            function_name: lambda2

    steps:
      - name: Check whether this Lambda should deploy
        id: should_deploy
        shell: bash
        run: |
          set -euo pipefail

          echo "Target function: $TARGET_FUNCTION"
          echo "Current matrix function: ${{ matrix.lambda.key }}"

          if [ "$TARGET_FUNCTION" = "all" ] || [ "$TARGET_FUNCTION" = "${{ matrix.lambda.key }}" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "This Lambda will be deployed."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this Lambda."
          fi

      - name: Checkout repository
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install AWS Lambda .NET Tools
        if: steps.should_deploy.outputs.deploy == 'true'
        shell: bash
        run: |
          dotnet tool install -g Amazon.Lambda.Tools
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda
        if: steps.should_deploy.outputs.deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          PROJECT_DIR="${{ matrix.lambda.project_dir }}"
          ZIP_FILE="artifacts/${{ matrix.lambda.key }}-${GITHUB_SHA}.zip"

          if [ ! -d "$PROJECT_DIR" ]; then
            echo "ERROR: Project directory not found: $PROJECT_DIR"
            exit 1
          fi

          if ! find "$PROJECT_DIR" -maxdepth 1 -name "*.csproj" | grep -q .; then
            echo "ERROR: No .csproj file found in: $PROJECT_DIR"
            exit 1
          fi

          echo "Packaging Lambda project: $PROJECT_DIR"
          echo "Output package: $ZIP_FILE"

          dotnet lambda package \
            --project-location "$PROJECT_DIR" \
            --configuration Release \
            --framework net10.0 \
            --output-package "$ZIP_FILE"

